<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SanctuaryBase | Saint Francis Rescue</title>
    <!-- Set theme before any render to prevent flash of unstyled content -->
    <script>
      (function () {
        var t = localStorage.getItem('sb_theme')
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark')
      })()
    </script>
    <script defer data-domain="sanctuarybase.pages.dev" src="https://plausible.io/js/script.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
