name = "sanctuarybase"
pages_build_output_dir = "dist"
compatibility_date = "2024-10-01"

compatibility_flags = ["nodejs_compat"]

# Cloudflare AI binding for Pages Functions
[ai]
binding = "AI"

# R2 Bucket for grant documents storage
[[r2_buckets]]
binding = "GRANTS_BUCKET"
bucket_name = "sanctuarybase-grants"
preview_bucket_name = "sanctuarybase-grants-preview"

# SITE_ADMIN_TOKEN (for proxying to the sfr-rescue.pages.dev API) is set as
# an encrypted secret on the Pages project via:
#   wrangler pages secret put SITE_ADMIN_TOKEN --project-name=sanctuarybase
